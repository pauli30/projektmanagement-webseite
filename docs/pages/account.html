<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundenkonto - Loop Studio</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .pdf-viewer-shell {
            background: #f7f7f7;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 1rem;
        }
        .pdf-toolbar {
            margin-bottom: 1rem;
            display: flex;
            justify-content: flex-end;
        }
        .pdf-pages {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .pdf-page-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 0.75rem;
        }
        .pdf-page-card canvas {
            width: 100%;
            height: auto;
            border: 1px solid #ccc;
            background: #fff;
            display: block;
        }
        .pdf-page-card p {
            margin: 0.5rem 0 0;
            text-align: center;
            font-size: 0.95rem;
            color: #555;
        }
    </style>
</head>
<body>
    <header>
        <div id="logo-container">
            <img src="/projektmanagement-webseite/images/LOOP%20STUDIO%20-%20Logo.png" alt="Loop Studio Logo" id="logo">
        </div>
        <nav>
            <ul>
                <li><a href="/projektmanagement-webseite/">Startseite</a></li>
                <li><a href="/projektmanagement-webseite/pages/products.html">Produkte</a></li>
                <li><a href="/projektmanagement-webseite/pages/brands.html">Marken</a></li>
                <li><a href="/projektmanagement-webseite/pages/popup-store.html">Pop-up-Store</a></li>
                <li><a href="/projektmanagement-webseite/pages/cart.html">Warenkorb (<span id="cart-count">0</span>)</a></li>
                <li><a href="/projektmanagement-webseite/pages/login.html">Anmelden</a></li>
                <li><a href="/projektmanagement-webseite/pages/account.html">Kundenkonto</a></li>
                <li><a href="/projektmanagement-webseite/pages/about.html">Über uns</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Kundenkonto</h2>
        <p>Hier ist der Projektmanagementplan als PDF hinterlegt.</p>
        <div class="pdf-viewer-shell">
            <div class="pdf-toolbar">
                <a href="/projektmanagement-webseite/files/Projektmanagement.pdf?v=4" class="checkout-btn" target="_blank" rel="noopener">PDF herunterladen</a>
            </div>
            <div id="pdf-pages" class="pdf-pages"></div>
        </div>
        <button id="logout-btn" class="checkout-btn">Abmelden</button>
    </main>
    <footer>
        <p>&copy; 2026 Loop Studio</p>
    </footer>
    <script src="../js/script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        const pdfUrl = '/projektmanagement-webseite/files/Projektmanagement.pdf?v=4';
        const container = document.getElementById('pdf-pages');

        if (window.pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
                const promises = [];
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    promises.push(pdf.getPage(pageNum).then(function(page) {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'pdf-page-card';

                        const canvas = document.createElement('canvas');
                        const viewport = page.getViewport({ scale: 1.2 });
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        wrapper.appendChild(canvas);

                        const label = document.createElement('p');
                        label.textContent = 'Seite ' + pageNum + ' von ' + pdf.numPages;
                        wrapper.appendChild(label);

                        container.appendChild(wrapper);

                        return page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                    }));
                }
                return Promise.all(promises);
            }).catch(function(error) {
                container.innerHTML = '<p>Die PDF konnte nicht geladen werden.</p>';
                console.error(error);
            });
        } else {
            container.innerHTML = '<p>Der PDF-Viewer konnte nicht geladen werden.</p>';
        }
    </script>
</body>
</html>
